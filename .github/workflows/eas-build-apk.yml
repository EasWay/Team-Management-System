name: EAS Build APK / AAB

on:
  # Manually trigger from GitHub → Actions tab → Run workflow
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile (preview = APK, production = AAB)'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - development
          - production

jobs:
  build-android:
    name: Build Android APK / AAB
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: team-manager/mobile/package-lock.json

      - name: Install dependencies
        working-directory: team-manager/mobile
        run: npm install --legacy-peer-deps

      - name: Setup Expo + EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK / AAB via EAS
        working-directory: team-manager/mobile
        run: |
          eas build \
            --platform android \
            --profile ${{ github.event.inputs.profile || 'preview' }} \
            --non-interactive \
            --clear-cache \
            --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build submitted
        run: |
          echo "Build submitted to EAS!"
          echo "Track progress and download your build at: https://expo.dev/accounts/[your-username]/projects/team-manager-mobile/builds"
